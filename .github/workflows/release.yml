name: Release binaries

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tap_bump_tag:
        description: Existing tag to run the Homebrew tap bump against (e.g. v0.1.0); leave empty to skip
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  RUSTC_WRAPPER: sccache
  SCCACHE_GHA_ENABLED: "true"

jobs:
  test:
    name: Test workspace
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Install stable Rust
        run: rustup toolchain install stable --profile minimal
      - name: Select stable Rust
        run: rustup default stable
      - name: Install sccache
        uses: mozilla-actions/sccache-action@v0.0.10
      - name: Build workspace binaries
        run: cargo build --workspace --bins --locked
      - name: Test workspace
        run: cargo test --workspace --locked

  build:
    name: Build ${{ matrix.target }}
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-15
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Install stable Rust
        run: rustup toolchain install stable --profile minimal
      - name: Select stable Rust
        run: rustup default stable
      - name: Install sccache
        uses: mozilla-actions/sccache-action@v0.0.10
      - name: Build release binaries
        run: cargo build --workspace --bins --release --locked
      - name: Package Unix binaries
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          set -euo pipefail
          package="arx-${{ matrix.target }}"
          staging="dist/${package}"
          mkdir -p "${staging}"
          cp target/release/arx "${staging}/"
          cp target/release/arx-mcp "${staging}/"
          cp target/release/arxd "${staging}/"
          cp README.md LICENSE "${staging}/"
          tar -czf "dist/${package}.tar.gz" -C dist "${package}"
          shasum -a 256 "dist/${package}.tar.gz" > "dist/${package}.tar.gz.sha256"
      - name: Package Windows binaries
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $package = "arx-${{ matrix.target }}"
          $staging = "dist/$package"
          New-Item -ItemType Directory -Force -Path $staging | Out-Null
          Copy-Item target/release/arx.exe "$staging/"
          Copy-Item target/release/arx-mcp.exe "$staging/"
          Copy-Item target/release/arxd.exe "$staging/"
          Copy-Item README.md "$staging/"
          Copy-Item LICENSE "$staging/"
          Compress-Archive -Path "$staging/*" -DestinationPath "dist/$package.zip" -Force
          $hash = Get-FileHash -Algorithm SHA256 "dist/$package.zip"
          "$($hash.Hash.ToLower())  $package.zip" | Set-Content -NoNewline "dist/$package.zip.sha256"
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: package-${{ matrix.target }}
          path: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256
            dist/*.zip
            dist/*.zip.sha256
          if-no-files-found: error
          retention-days: 14

  github-release:
    name: Publish GitHub release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: package-*
          path: release-assets
          merge-multiple: true
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release create "$TAG_NAME" release-assets/* \
            --repo "$GITHUB_REPOSITORY" \
            --title "$TAG_NAME" \
            --notes "Prebuilt arx, arxd, and arx-mcp binaries for Linux x86_64, macOS arm64, and Windows x86_64."

  tap-bump:
    name: Bump Homebrew tap formula
    if: ${{ !cancelled() && (needs.github-release.result == 'success' || (github.event_name == 'workflow_dispatch' && inputs.tap_bump_tag != '')) }}
    needs: github-release
    runs-on: ubuntu-latest
    steps:
      - name: Check tap token
        id: token
        env:
          TAP_BUMP_TOKEN: ${{ secrets.TAP_BUMP_TOKEN }}
        run: |
          if [ -n "$TAP_BUMP_TOKEN" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "TAP_BUMP_TOKEN secret is not configured; skipping Homebrew tap bump." >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: Open tap bump pull request
        if: steps.token.outputs.available == 'true'
        env:
          GH_TOKEN: ${{ secrets.TAP_BUMP_TOKEN }}
          TAG_NAME: ${{ inputs.tap_bump_tag || github.ref_name }}
          TAP_REPO: eric-tramel/homebrew-tap
        run: |
          set -euo pipefail
          url="https://github.com/${GITHUB_REPOSITORY}/archive/refs/tags/${TAG_NAME}.tar.gz"
          sha256="$(curl -fsSL "$url" | shasum -a 256 | cut -d' ' -f1)"
          git clone "https://x-access-token:${GH_TOKEN}@github.com/${TAP_REPO}.git" tap
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          branch="bump-arx-${TAG_NAME}"
          git checkout -b "$branch"
          sed -i -E "s|^  url \".*\"$|  url \"${url}\"|" Formula/arx.rb
          sed -i -E "s|^  sha256 \".*\"$|  sha256 \"${sha256}\"|" Formula/arx.rb
          draft_args=()
          if git diff --quiet; then
            echo "Formula already at ${TAG_NAME}; opening no-op draft PR to validate the token."
            git commit --allow-empty -m "arx ${TAG_NAME#v} (tap-bump validation, no formula change)"
            draft_args=(--draft)
          else
            git commit -am "arx ${TAG_NAME#v}"
          fi
          git push --force origin "$branch"
          gh pr create --repo "$TAP_REPO" ${draft_args[@]+"${draft_args[@]}"} \
            --title "arx ${TAG_NAME#v}" \
            --body "Automated bump for ${GITHUB_REPOSITORY} release ${TAG_NAME}. Bottles are built by brew test-bot and published automatically by the brew pr-pull workflow once checks pass." \
            --head "$branch" --base main
