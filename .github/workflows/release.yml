name: Release binaries

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test workspace
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Install stable Rust
        run: rustup toolchain install stable --profile minimal
      - name: Select stable Rust
        run: rustup default stable
      - name: Test workspace
        run: cargo test --workspace --locked

  build:
    name: Build ${{ matrix.target }}
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-15
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Install stable Rust
        run: rustup toolchain install stable --profile minimal
      - name: Select stable Rust
        run: rustup default stable
      - name: Build release binaries
        run: cargo build --workspace --bins --release --locked
      - name: Package Unix binaries
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          set -euo pipefail
          package="arx-${{ matrix.target }}"
          staging="dist/${package}"
          mkdir -p "${staging}"
          cp target/release/arx "${staging}/"
          cp target/release/arx-mcp "${staging}/"
          cp README.md LICENSE "${staging}/"
          tar -czf "dist/${package}.tar.gz" -C dist "${package}"
          shasum -a 256 "dist/${package}.tar.gz" > "dist/${package}.tar.gz.sha256"
      - name: Package Windows binaries
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $package = "arx-${{ matrix.target }}"
          $staging = "dist/$package"
          New-Item -ItemType Directory -Force -Path $staging | Out-Null
          Copy-Item target/release/arx.exe "$staging/"
          Copy-Item target/release/arx-mcp.exe "$staging/"
          Copy-Item README.md "$staging/"
          Copy-Item LICENSE "$staging/"
          Compress-Archive -Path "$staging/*" -DestinationPath "dist/$package.zip" -Force
          $hash = Get-FileHash -Algorithm SHA256 "dist/$package.zip"
          "$($hash.Hash.ToLower())  $package.zip" | Set-Content -NoNewline "dist/$package.zip.sha256"
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: package-${{ matrix.target }}
          path: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256
            dist/*.zip
            dist/*.zip.sha256
          if-no-files-found: error
          retention-days: 14

  github-release:
    name: Publish GitHub release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: package-*
          path: release-assets
          merge-multiple: true
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release create "$TAG_NAME" release-assets/* \
            --repo "$GITHUB_REPOSITORY" \
            --title "$TAG_NAME" \
            --notes "Prebuilt arx and arx-mcp binaries for Linux x86_64, macOS arm64, and Windows x86_64."
